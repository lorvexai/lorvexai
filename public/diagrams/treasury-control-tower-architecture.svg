<svg width="1400" height="860" viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Treasury control tower architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#0F2A4A"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#13365E"/><stop offset="100%" stop-color="#112F52"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#7EC7FF"/></marker>
    <style>.title{font:700 42px 'Segoe UI';fill:#E8F3FF}.subtitle{font:500 20px 'Segoe UI';fill:#B9D9F8}.label{font:700 20px 'Segoe UI';fill:#EAF5FF}.text{font:500 16px 'Segoe UI';fill:#CDE3FA}.chip{font:700 14px 'Segoe UI';fill:#DFF6FF}</style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <text class="title" x="70" y="75">AI-Native Treasury Control Tower</text>
  <text class="subtitle" x="70" y="108">Real-time liquidity, risk, and decisioning architecture</text>

  <rect x="70" y="150" rx="18" width="260" height="520" fill="url(#panel)" stroke="#5EA9E8" stroke-width="2"/>
  <text class="label" x="95" y="188">Data Fabric</text>
  <text class="text" x="95" y="225">- Cash positions</text><text class="text" x="95" y="252">- Payments flows</text><text class="text" x="95" y="279">- Market rates and FX</text><text class="text" x="95" y="306">- Counterparty limits</text>

  <rect x="395" y="150" rx="18" width="300" height="520" fill="url(#panel)" stroke="#67D4B8" stroke-width="2"/>
  <text class="label" x="420" y="188">AI Intelligence Layer</text>
  <text class="text" x="420" y="225">- AI model: intraday cash forecast</text><text class="text" x="420" y="252">- AI model: stress simulation</text><text class="text" x="420" y="279">- AI model: anomaly detection</text>

  <rect x="760" y="150" rx="18" width="280" height="520" fill="url(#panel)" stroke="#F3B367" stroke-width="2"/>
  <text class="label" x="785" y="188">Decision Hub (AI + Human)</text>
  <text class="text" x="785" y="225">- AI output: liquidity actions</text><text class="text" x="785" y="252">- AI output: funding options</text><text class="text" x="785" y="279">- AI output: hedging proposals</text>

  <rect x="1105" y="150" rx="18" width="230" height="520" fill="url(#panel)" stroke="#FF85A9" stroke-width="2"/>
  <text class="label" x="1130" y="188">Governance</text>
  <text class="text" x="1130" y="225">- Audit trails</text><text class="text" x="1130" y="252">- Model controls</text><text class="text" x="1130" y="279">- Regulatory packs</text>

  <path d="M330 410 L392 410" stroke="#7EC7FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M695 410 L757 410" stroke="#7EC7FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1040 410 L1102 410" stroke="#7EC7FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1220 670 C1220 740, 900 770, 540 770 C360 770, 280 730, 280 675" stroke="#57D4AF" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <rect x="70" y="710" rx="14" width="1260" height="96" fill="#0D2746" stroke="#2A5F93"/>
  <text class="subtitle" x="95" y="748">Outcome: faster intraday decisions, lower liquidity risk, stronger governance evidence.</text>
  <text class="text" x="95" y="780">Design pattern: AI recommends, humans approve high-impact actions, system learns from outcomes.</text>
</svg>
