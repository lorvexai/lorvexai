<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI enterprise blueprint">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09182C"/>
      <stop offset="100%" stop-color="#123E6A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153D66" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#0D2948" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D517F"/>
      <stop offset="100%" stop-color="#134067"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#C8ECFF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#BDF5DB"/>
    </marker>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .lane{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#EBF7FF}
      .laneMeta{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#C9E6FF}
      .cardTitle{font:700 19px 'Segoe UI',Arial,sans-serif;fill:#EEF8FF}
      .cardBody{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
      .flow{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="720" cy="390" rx="580" ry="320" fill="#2F80ED" fill-opacity="0.14"/>

  <text x="78" y="84" class="title">Agentic AI Enterprise Blueprint</text>
  <text x="78" y="116" class="sub">Controlled autonomy with clear policy gates and human oversight</text>

  <rect x="80" y="150" width="1280" height="710" rx="26" fill="#0C223C" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="110" y="190" width="1220" height="170" rx="20" fill="url(#panel)" stroke="#4F98D9"/>
  <text x="150" y="228" class="lane">Control Lane</text>
  <text x="150" y="250" class="laneMeta">Goal intake, policy interpretation, planning, and risk tiering</text>

  <rect x="110" y="390" width="1220" height="210" rx="20" fill="url(#panel)" stroke="#4F98D9"/>
  <text x="150" y="428" class="lane">Execution Lane</text>
  <text x="150" y="450" class="laneMeta">Agent orchestration, tool/API actions, state updates, and memory access</text>

  <rect x="110" y="630" width="1220" height="200" rx="20" fill="url(#panel)" stroke="#4F98D9"/>
  <text x="150" y="668" class="lane">Trust Lane</text>
  <text x="150" y="690" class="laneMeta">Validation, confidence checks, escalation, approval, and audit trails</text>

  <rect x="180" y="260" width="240" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="300" y="296" text-anchor="middle" class="cardTitle">Goal Intake</text>
  <text x="300" y="319" text-anchor="middle" class="cardBody">Intent and constraints</text>

  <rect x="460" y="260" width="240" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="580" y="296" text-anchor="middle" class="cardTitle">Policy Gate</text>
  <text x="580" y="319" text-anchor="middle" class="cardBody">Action boundaries</text>

  <rect x="740" y="260" width="240" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="860" y="296" text-anchor="middle" class="cardTitle">Planner</text>
  <text x="860" y="319" text-anchor="middle" class="cardBody">Task graph</text>

  <rect x="1020" y="260" width="240" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1140" y="296" text-anchor="middle" class="cardTitle">Risk Tiering</text>
  <text x="1140" y="319" text-anchor="middle" class="cardBody">Low / Med / High</text>

  <rect x="180" y="490" width="240" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="300" y="528" text-anchor="middle" class="cardTitle">Orchestrator</text>
  <text x="300" y="551" text-anchor="middle" class="cardBody">Retry + fallback logic</text>

  <rect x="460" y="490" width="240" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="580" y="528" text-anchor="middle" class="cardTitle">Tool / API Mesh</text>
  <text x="580" y="551" text-anchor="middle" class="cardBody">ERP, CRM, risk, ops</text>

  <rect x="740" y="490" width="240" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="860" y="528" text-anchor="middle" class="cardTitle">Memory Layer</text>
  <text x="860" y="551" text-anchor="middle" class="cardBody">Session + knowledge</text>

  <rect x="1020" y="490" width="240" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1140" y="528" text-anchor="middle" class="cardTitle">Action Result</text>
  <text x="1140" y="551" text-anchor="middle" class="cardBody">Evidence + state delta</text>

  <rect x="210" y="730" width="300" height="85" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="360" y="765" text-anchor="middle" class="cardTitle">Verification</text>
  <text x="360" y="787" text-anchor="middle" class="cardBody">Policy + consistency checks</text>

  <rect x="570" y="730" width="300" height="85" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="720" y="765" text-anchor="middle" class="cardTitle">Confidence Scoring</text>
  <text x="720" y="787" text-anchor="middle" class="cardBody">Escalate on low confidence</text>

  <rect x="930" y="730" width="300" height="85" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1080" y="765" text-anchor="middle" class="cardTitle">Human Approval</text>
  <text x="1080" y="787" text-anchor="middle" class="cardBody">Required for high impact</text>

  <path d="M420 305 L460 305" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M700 305 L740 305" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M980 305 L1020 305" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <path d="M300 350 L300 490" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M580 350 L580 490" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M860 350 L860 490" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M1140 350 L1140 490" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <path d="M420 537 L460 537" stroke="#BDF5DB" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M700 537 L740 537" stroke="#BDF5DB" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M980 537 L1020 537" stroke="#BDF5DB" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <path d="M300 585 L360 730" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M580 585 L720 730" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M860 585 L1080 730" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <path d="M1080 730 C1210 670,1260 610,1260 537" stroke="#BDF5DB" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="1140" y="670" class="flow">approved actions return to runtime</text>
</svg>
