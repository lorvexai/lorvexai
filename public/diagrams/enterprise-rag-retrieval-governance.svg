<svg width="1440" height="860" viewBox="0 0 1440 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RAG retrieval and governance flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#09182C"/><stop offset="100%" stop-color="#123E6A"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1D517F"/><stop offset="100%" stop-color="#134067"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#C8ECFF"/></marker>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .cardTitle{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#EEF8FF}
      .cardBody{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
      .flow{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#DAEEFF}
    </style>
  </defs>

  <rect width="1440" height="860" fill="url(#bg)"/>
  <ellipse cx="720" cy="370" rx="600" ry="300" fill="#2F80ED" fill-opacity="0.14"/>

  <text x="86" y="82" class="title">RAG Retrieval and Governance Flow</text>
  <text x="86" y="112" class="sub">Operational sequence from query to monitored answer</text>

  <rect x="90" y="150" width="1260" height="640" rx="24" fill="#0C223C" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="130" y="250" width="180" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="220" y="286" text-anchor="middle" class="cardTitle">Query</text>
  <text x="220" y="309" text-anchor="middle" class="cardBody">Intent + ACL</text>

  <rect x="340" y="250" width="180" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="430" y="286" text-anchor="middle" class="cardTitle">Rewrite</text>
  <text x="430" y="309" text-anchor="middle" class="cardBody">Expand entities</text>

  <rect x="550" y="250" width="180" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="640" y="286" text-anchor="middle" class="cardTitle">Retrieve</text>
  <text x="640" y="309" text-anchor="middle" class="cardBody">Vector + keyword</text>

  <rect x="760" y="250" width="180" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="850" y="286" text-anchor="middle" class="cardTitle">Rerank</text>
  <text x="850" y="309" text-anchor="middle" class="cardBody">Top-k relevance</text>

  <rect x="970" y="250" width="180" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1060" y="286" text-anchor="middle" class="cardTitle">Context</text>
  <text x="1060" y="309" text-anchor="middle" class="cardBody">Pack evidence</text>

  <rect x="1180" y="250" width="130" height="90" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1245" y="286" text-anchor="middle" class="cardTitle">Answer</text>
  <text x="1245" y="309" text-anchor="middle" class="cardBody">Cited</text>

  <path d="M310 295 L340 295" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M520 295 L550 295" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M730 295 L760 295" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M940 295 L970 295" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1150 295 L1180 295" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="170" y="430" width="1100" height="280" rx="18" fill="#123458" stroke="#4F98D9"/>
  <text x="210" y="470" class="cardTitle">Governance Gates</text>

  <rect x="210" y="500" width="500" height="72" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="460" y="531" text-anchor="middle" class="cardTitle">Grounding and Citation Check</text>
  <text x="460" y="553" text-anchor="middle" class="cardBody">Ensure each claim maps to approved source chunks</text>

  <rect x="740" y="500" width="490" height="72" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="985" y="531" text-anchor="middle" class="cardTitle">Policy and Sensitive Data Controls</text>
  <text x="985" y="553" text-anchor="middle" class="cardBody">Apply redaction, compliance, and access constraints</text>

  <rect x="210" y="595" width="500" height="72" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="460" y="626" text-anchor="middle" class="cardTitle">Quality and Risk Review</text>
  <text x="460" y="648" text-anchor="middle" class="cardBody">Score confidence and route uncertain answers for review</text>

  <rect x="740" y="595" width="490" height="72" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="985" y="626" text-anchor="middle" class="cardTitle">Telemetry Feedback</text>
  <text x="985" y="648" text-anchor="middle" class="cardBody">Latency, cost, and quality signals tune retrieval policy</text>

  <path d="M1245 340 C1280 380,1280 430,1240 465" stroke="#BDF5DB" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M210 465 C170 430,170 380,205 340" stroke="#BDF5DB" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="1150" y="420" class="flow">post-answer checks</text>
  <text x="145" y="420" class="flow">feedback to routing</text>
</svg>
