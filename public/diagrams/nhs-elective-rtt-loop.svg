<rect x="220" y="400" width="840" height="150" rx="12" fill="#0D2746" stroke="#2D649D"/><text class="s" x="250" y="438">Objective: reduce waiting time and DNA rates while preserving equity and clinical safety.</text><text class="s" x="250" y="462">Human gate remains mandatory for high-risk or high-impact pathway changes.</text>
