<svg width="1440" height="860" viewBox="0 0 1440 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RAG governance loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#09182C"/><stop offset="100%" stop-color="#12355C"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#C8ECFF"/></marker>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#EAF4FF}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .node{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#EFF8FF}
      .meta{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
    </style>
  </defs>

  <rect width="1440" height="860" fill="url(#bg)"/>
  <ellipse cx="720" cy="380" rx="580" ry="290" fill="#2F80ED" fill-opacity="0.14"/>

  <text x="86" y="84" class="title">Governance and Evaluation Loop</text>
  <text x="86" y="114" class="sub">Continuous control cycle for reliability, compliance, and quality</text>

  <circle cx="720" cy="450" r="270" fill="#10345A" stroke="#3F8DD6" stroke-width="2"/>
  <circle cx="720" cy="450" r="110" fill="#123C65" stroke="#69B8F2"/>
  <text x="720" y="442" text-anchor="middle" class="node">CONTROL</text>
  <text x="720" y="464" text-anchor="middle" class="node">CENTER</text>

  <rect x="654" y="170" width="132" height="72" rx="14" fill="#1C517F" stroke="#79C0F7"/>
  <text x="720" y="199" text-anchor="middle" class="node">Log</text>
  <text x="720" y="219" text-anchor="middle" class="meta">Trace capture</text>

  <rect x="942" y="286" width="132" height="72" rx="14" fill="#1C517F" stroke="#79C0F7"/>
  <text x="1008" y="315" text-anchor="middle" class="node">Evaluate</text>
  <text x="1008" y="335" text-anchor="middle" class="meta">Quality score</text>

  <rect x="942" y="542" width="132" height="72" rx="14" fill="#542B3C" stroke="#FF9ABD"/>
  <text x="1008" y="571" text-anchor="middle" class="node">Review</text>
  <text x="1008" y="591" text-anchor="middle" class="meta">Risk analysis</text>

  <rect x="654" y="658" width="132" height="72" rx="14" fill="#2E4E3A" stroke="#8EE5BD"/>
  <text x="720" y="687" text-anchor="middle" class="node">Tune</text>
  <text x="720" y="707" text-anchor="middle" class="meta">Policy updates</text>

  <rect x="366" y="542" width="132" height="72" rx="14" fill="#2E4E3A" stroke="#8EE5BD"/>
  <text x="432" y="571" text-anchor="middle" class="node">Release</text>
  <text x="432" y="591" text-anchor="middle" class="meta">Canary deploy</text>

  <rect x="366" y="286" width="132" height="72" rx="14" fill="#1C517F" stroke="#79C0F7"/>
  <text x="432" y="315" text-anchor="middle" class="node">Monitor</text>
  <text x="432" y="335" text-anchor="middle" class="meta">Live metrics</text>

  <path d="M786 206 L942 310" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M1008 358 L1008 542" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M942 590 L786 694" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M654 694 L498 590" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M432 542 L432 358" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M498 310 L654 206" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arr)"/>

  <text x="720" y="812" text-anchor="middle" class="meta">Objective: improve answer quality while preserving compliance and operational stability.</text>
</svg>
