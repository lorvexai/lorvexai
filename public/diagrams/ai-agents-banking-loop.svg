<svg width="1440" height="780" viewBox="0 0 1440 780" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Operating loop for AI agents in banking operations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071426"/>
      <stop offset="55%" stop-color="#0B2038"/>
      <stop offset="100%" stop-color="#102B47"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="8%" r="80%">
      <stop offset="0%" stop-color="#5EA8FF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5EA8FF" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L13 7 L1 13 Z" fill="#9BD5FF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L13 7 L1 13 Z" fill="#7EE7C7"/>
    </marker>
    <style>
      .title{font:700 42px Inter,'Segoe UI',Arial,sans-serif;fill:#F2F7FF}
      .subtitle{font:500 18px Inter,'Segoe UI',Arial,sans-serif;fill:#BFD7EE}
      .kicker{font:700 12px Inter,'Segoe UI',Arial,sans-serif;letter-spacing:.16em;fill:#7DD3FC}
      .stepNo{font:800 22px Inter,'Segoe UI',Arial,sans-serif;fill:#071426}
      .head{font:700 20px Inter,'Segoe UI',Arial,sans-serif;fill:#F2F7FF}
      .body{font:500 15px Inter,'Segoe UI',Arial,sans-serif;fill:#C8D8EA}
      .small{font:600 13px Inter,'Segoe UI',Arial,sans-serif;fill:#AFC5DC}
      .canvas{fill:#071B31;stroke:#244D75;stroke-width:1}
      .card1{fill:#102F4F;stroke:#76C6FF;stroke-width:1.3}
      .card2{fill:#123B42;stroke:#6EE7D8;stroke-width:1.3}
      .card3{fill:#3E2E26;stroke:#F7B267;stroke-width:1.3}
      .card4{fill:#3C3147;stroke:#C4A7FF;stroke-width:1.3}
      .rail{fill:#0E2946;stroke:#3B82C4;stroke-width:1.2}
      .line{fill:none;stroke:#9BD5FF;stroke-width:2.6;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .loop{fill:none;stroke:#7EE7C7;stroke-width:2.5;marker-end:url(#arrowGreen);stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:9 9}
    </style>
  </defs>

  <rect width="1440" height="780" fill="url(#bg)"/>
  <rect width="1440" height="780" fill="url(#glow)"/>
  <rect class="canvas" x="58" y="48" width="1324" height="684" rx="28"/>

  <text class="kicker" x="92" y="96">OPERATING LOOP</text>
  <text class="title" x="92" y="146">AI Agents in Banking Operations</text>
  <text class="subtitle" x="92" y="178">A controlled cycle from alert detection to human approval, evidence capture, and feedback.</text>

  <g transform="translate(104 250)">
    <rect class="card1" x="0" y="0" width="210" height="150" rx="18"/>
    <circle cx="34" cy="34" r="20" fill="#7DD3FC"/>
    <text class="stepNo" x="34" y="42" text-anchor="middle">1</text>
    <text class="head" x="24" y="78">Detect</text>
    <text class="body" x="24" y="108">Transaction, sanctions,</text>
    <text class="body" x="24" y="130">fraud, or AML alert</text>
  </g>

  <g transform="translate(350 250)">
    <rect class="card2" x="0" y="0" width="210" height="150" rx="18"/>
    <circle cx="34" cy="34" r="20" fill="#6EE7D8"/>
    <text class="stepNo" x="34" y="42" text-anchor="middle">2</text>
    <text class="head" x="24" y="78">Investigate</text>
    <text class="body" x="24" y="108">Assemble evidence,</text>
    <text class="body" x="24" y="130">history, and links</text>
  </g>

  <g transform="translate(596 250)">
    <rect class="card3" x="0" y="0" width="210" height="150" rx="18"/>
    <circle cx="34" cy="34" r="20" fill="#F7B267"/>
    <text class="stepNo" x="34" y="42" text-anchor="middle">3</text>
    <text class="head" x="24" y="78">Propose</text>
    <text class="body" x="24" y="108">Draft action options</text>
    <text class="body" x="24" y="130">with rationale</text>
  </g>

  <g transform="translate(842 250)">
    <rect class="card4" x="0" y="0" width="210" height="150" rx="18"/>
    <circle cx="34" cy="34" r="20" fill="#C4A7FF"/>
    <text class="stepNo" x="34" y="42" text-anchor="middle">4</text>
    <text class="head" x="24" y="78">Approve</text>
    <text class="body" x="24" y="108">Route material cases</text>
    <text class="body" x="24" y="130">to human review</text>
  </g>

  <g transform="translate(1088 250)">
    <rect class="card1" x="0" y="0" width="210" height="150" rx="18"/>
    <circle cx="34" cy="34" r="20" fill="#7DD3FC"/>
    <text class="stepNo" x="34" y="42" text-anchor="middle">5</text>
    <text class="head" x="24" y="78">Learn</text>
    <text class="body" x="24" y="108">Capture outcome,</text>
    <text class="body" x="24" y="130">quality, and drift</text>
  </g>

  <path class="line" d="M314 325 L344 325"/>
  <path class="line" d="M560 325 L590 325"/>
  <path class="line" d="M806 325 L836 325"/>
  <path class="line" d="M1052 325 L1082 325"/>

  <path class="loop" d="M1193 418 C1193 515, 248 515, 209 418"/>
  <text class="small" x="720" y="546" text-anchor="middle">Feedback loop: override reasons, investigation outcomes, false positives, model quality, and policy changes</text>

  <rect class="rail" x="166" y="595" width="1108" height="78" rx="18"/>
  <text class="head" x="204" y="628">Governance rail</text>
  <text class="body" x="204" y="654">Policy checks, approval thresholds, immutable audit logs, evidence completeness, and monitoring operate across every step.</text>
</svg>
