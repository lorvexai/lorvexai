      .node2{fill:#123B42;stroke:#6EE7D8;stroke-width:1.2}
      .node3{fill:#3C3147;stroke:#C4A7FF;stroke-width:1.2}
      .node4{fill:#3E2E26;stroke:#F7B267;stroke-width:1.2}
      .line{fill:none;stroke:#9BD5FF;stroke-width:2.4;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round}
      .soft{fill:none;stroke:#72E4C2;stroke-width:2.2;marker-end:url(#arrow);stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:7 8}
    </style>
