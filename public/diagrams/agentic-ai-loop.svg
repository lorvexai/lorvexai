<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic reliability and escalation loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09182C"/>
      <stop offset="100%" stop-color="#133F6A"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E5482"/>
      <stop offset="100%" stop-color="#14416A"/>
    </linearGradient>
    <linearGradient id="safe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67DFAC"/>
      <stop offset="100%" stop-color="#BDF5DC"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8FB2"/>
      <stop offset="100%" stop-color="#FFC0D4"/>
    </linearGradient>
    <marker id="arrowSafe" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#BDF5DC"/></marker>
    <marker id="arrowRisk" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#FFC0D4"/></marker>
    <style>
      .title{font:700 46px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#C8E4FC}
      .node{font:700 18px 'Segoe UI',Arial,sans-serif;fill:#EFF8FF}
      .meta{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#D6EDFF}
      .label{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#DAEEFF}
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <ellipse cx="700" cy="380" rx="560" ry="280" fill="#2F80ED" fill-opacity="0.15"/>

  <text x="78" y="80" class="title">Agentic Reliability Loop</text>
  <text x="78" y="112" class="sub">Fast autonomy when confidence is high, human control when risk rises</text>

  <circle cx="700" cy="425" r="268" fill="url(#ring)" stroke="#4A96DA" stroke-width="2"/>
  <circle cx="700" cy="425" r="112" fill="#123C65" stroke="#75BFF8"/>
  <text x="700" y="414" text-anchor="middle" class="node">SAFE</text>
  <text x="700" y="438" text-anchor="middle" class="node">AUTONOMY CORE</text>

  <g>
    <rect x="634" y="126" width="132" height="68" rx="14" fill="#1C517F" stroke="#79C0F7"/>
    <text x="700" y="154" text-anchor="middle" class="node">Observe</text>
    <text x="700" y="173" text-anchor="middle" class="meta">Goal + context</text>

    <rect x="900" y="220" width="132" height="68" rx="14" fill="#1C517F" stroke="#79C0F7"/>
    <text x="966" y="248" text-anchor="middle" class="node">Plan</text>
    <text x="966" y="267" text-anchor="middle" class="meta">Task graph</text>

    <rect x="1008" y="392" width="132" height="68" rx="14" fill="#1C517F" stroke="#79C0F7"/>
    <text x="1074" y="420" text-anchor="middle" class="node">Act</text>
    <text x="1074" y="439" text-anchor="middle" class="meta">Tool calls</text>

    <rect x="900" y="564" width="132" height="68" rx="14" fill="#2E4E3A" stroke="#8EE5BD"/>
    <text x="966" y="592" text-anchor="middle" class="node">Verify</text>
    <text x="966" y="611" text-anchor="middle" class="meta">Quality + policy</text>

    <rect x="634" y="656" width="132" height="68" rx="14" fill="#2E4E3A" stroke="#8EE5BD"/>
    <text x="700" y="684" text-anchor="middle" class="node">Learn</text>
    <text x="700" y="703" text-anchor="middle" class="meta">Feedback tuning</text>

    <rect x="368" y="564" width="132" height="68" rx="14" fill="#542B3C" stroke="#FF9ABD"/>
    <text x="434" y="592" text-anchor="middle" class="node">Escalate</text>
    <text x="434" y="611" text-anchor="middle" class="meta">Confidence drop</text>

    <rect x="260" y="392" width="132" height="68" rx="14" fill="#542B3C" stroke="#FF9ABD"/>
    <text x="326" y="420" text-anchor="middle" class="node">Approve</text>
    <text x="326" y="439" text-anchor="middle" class="meta">Human gate</text>

    <rect x="368" y="220" width="132" height="68" rx="14" fill="#1C517F" stroke="#79C0F7"/>
    <text x="434" y="248" text-anchor="middle" class="node">Resume</text>
    <text x="434" y="267" text-anchor="middle" class="meta">Controlled return</text>
  </g>

  <path d="M766 184 L900 240" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>
  <path d="M1032 288 L1060 392" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>
  <path d="M1060 460 L1032 564" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>
  <path d="M900 632 L766 688" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>
  <path d="M634 688 L500 632" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>
  <path d="M368 564 L340 460" stroke="url(#risk)" stroke-width="4" marker-end="url(#arrowRisk)"/>
  <path d="M340 392 L368 288" stroke="url(#risk)" stroke-width="4" marker-end="url(#arrowRisk)"/>
  <path d="M500 240 L634 184" stroke="url(#safe)" stroke-width="4" marker-end="url(#arrowSafe)"/>

  <path d="M980 600 C1120 610,1220 565,1260 470" stroke="url(#risk)" stroke-width="4" fill="none" marker-end="url(#arrowRisk)"/>
  <text x="1130" y="610" class="label">if policy risk is high -> escalate</text>

  <path d="M326 392 C240 340,220 250,286 186" stroke="url(#safe)" stroke-width="4" fill="none" marker-end="url(#arrowSafe)"/>
  <text x="190" y="300" class="label">human-approved restart</text>
</svg>
