<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Agentic AI reliability clock">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1f3a"/><stop offset="100%" stop-color="#163f70"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#9ad8ff"/></marker>
    <style>
      .t{font:700 36px 'Segoe UI',Arial,sans-serif;fill:#ecf7ff}
      .n{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#eef9ff}
      .s{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#d7ebff}
    </style>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <text class="t" x="80" y="70">Agentic Reliability Clock</text>

  <circle cx="700" cy="410" r="250" fill="#0f2f56" stroke="#4ba3e8" stroke-width="2"/>
  <circle cx="700" cy="410" r="90" fill="#123f6a" stroke="#67b5f0"/>
  <text class="n" x="667" y="405">SAFE</text>
  <text class="n" x="648" y="428">AUTONOMY</text>

  <g>
    <circle cx="700" cy="170" r="64" fill="#143f6d" stroke="#67b5f0"/><text class="n" x="664" y="175">Observe</text>
    <circle cx="905" cy="240" r="64" fill="#124b5e" stroke="#5ac8cf"/><text class="n" x="880" y="245">Plan</text>
    <circle cx="1010" cy="410" r="64" fill="#124b5e" stroke="#5ac8cf"/><text class="n" x="992" y="415">Act</text>
    <circle cx="905" cy="580" r="64" fill="#4f3f1c" stroke="#f0b56c"/><text class="n" x="879" y="585">Verify</text>
    <circle cx="700" cy="650" r="64" fill="#4c2637" stroke="#ff8fb2"/><text class="n" x="655" y="655">Escalate</text>
    <circle cx="495" cy="580" r="64" fill="#4c2637" stroke="#ff8fb2"/><text class="n" x="468" y="585">Approve</text>
    <circle cx="390" cy="410" r="64" fill="#143f6d" stroke="#67b5f0"/><text class="n" x="370" y="415">Learn</text>
    <circle cx="495" cy="240" r="64" fill="#143f6d" stroke="#67b5f0"/><text class="n" x="468" y="245">Tune</text>
  </g>

  <path d="M752 191 L855 226" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M954 289 L987 357" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M987 463 L954 531" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M855 594 L752 629" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M648 629 L545 594" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M446 531 L413 463" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M413 357 L446 289" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M545 226 L648 191" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>

  <text class="s" x="350" y="735">Clock rule: if confidence drops or policy risk rises, shift from autonomous path to human approval path.</text>
</svg>
