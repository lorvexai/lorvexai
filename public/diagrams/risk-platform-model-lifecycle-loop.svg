<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Model lifecycle and control loop with dependencies">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06162B"/><stop offset="100%" stop-color="#10385C"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D3EEFF"/></marker>
    <style>
      .t{font:700 40px 'Inter',Arial,sans-serif;fill:#EEF7FF}
      .s{font:500 16px 'Inter',Arial,sans-serif;fill:#C7E3FB}
      .h{font:700 14px 'Inter',Arial,sans-serif;fill:#F3FAFF}
      .b{font:500 12px 'Inter',Arial,sans-serif;fill:#D8EEFF}
      .n{font:600 11px 'Inter',Arial,sans-serif;fill:#D8EEFF}
      .flowPrimary{stroke-dasharray:14 90;animation:flowMove 3s linear infinite}
      .flowDep{stroke-dasharray:8 22;animation:flowMove 4s linear infinite}
      @keyframes flowMove{to{stroke-dashoffset:-120}}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="60" y="72" class="t">Model Lifecycle and Control Loop</text>
  <text x="60" y="98" class="s">Layer 5 lifecycle flow with layer 7 governance dependencies</text>

  <rect x="50" y="120" width="1300" height="740" rx="22" fill="#0A213A" stroke="#3F8DD6"/>

  <circle cx="700" cy="430" r="230" fill="#7A1F57" fill-opacity="0.2" stroke="#FF9FD1"/>

  <rect x="620" y="190" width="160" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="700" y="218" class="n" text-anchor="middle">5</text><text x="700" y="240" class="h" text-anchor="middle">Train</text><text x="700" y="260" class="b" text-anchor="middle">Model + feature training</text>
  <rect x="930" y="310" width="200" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="1030" y="338" class="n" text-anchor="middle">5</text><text x="1030" y="360" class="h" text-anchor="middle">Validate + Benchmark</text><text x="1030" y="380" class="b" text-anchor="middle">Performance and risk tests</text>
  <rect x="930" y="500" width="200" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="1030" y="528" class="n" text-anchor="middle">5</text><text x="1030" y="550" class="h" text-anchor="middle">Approval + Deploy</text><text x="1030" y="570" class="b" text-anchor="middle">Controlled production release</text>
  <rect x="620" y="620" width="160" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="700" y="648" class="n" text-anchor="middle">5</text><text x="700" y="670" class="h" text-anchor="middle">Monitor</text><text x="700" y="690" class="b" text-anchor="middle">Drift + incident tracking</text>
  <rect x="270" y="500" width="200" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="370" y="528" class="n" text-anchor="middle">5</text><text x="370" y="550" class="h" text-anchor="middle">Retrain Trigger</text><text x="370" y="570" class="b" text-anchor="middle">Threshold breach logic</text>
  <rect x="270" y="310" width="200" height="90" rx="12" fill="#7A1F57" stroke="#FF9FD1"/>
  <text x="370" y="338" class="n" text-anchor="middle">5</text><text x="370" y="360" class="h" text-anchor="middle">Workflow Orchestration</text><text x="370" y="380" class="b" text-anchor="middle">Pipeline and schedule control</text>

  <path class="flowPrimary" d="M780 235 L930 344" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path class="flowPrimary" d="M1030 400 L1030 500" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path class="flowPrimary" d="M930 545 L780 655" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path class="flowPrimary" d="M620 655 L470 545" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path class="flowPrimary" d="M370 500 L370 400" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path class="flowPrimary" d="M470 344 L620 235" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>

  <rect x="180" y="740" width="1040" height="70" rx="12" fill="#2D2256" stroke="#9070D8"/>
  <text x="700" y="766" class="n" text-anchor="middle">7 Governance, Controls and Compliance Dependency</text>
  <text x="700" y="789" class="b" text-anchor="middle">Model lineage, approval evidence, access controls, independent review, and audit trails across every stage</text>

  <path class="flowDep" d="M700 710 L700 740" stroke="#9BE9C5" stroke-width="2.6" marker-end="url(#arr)"/>
  <path class="flowDep" d="M1030 590 C1030 700,900 725,780 740" stroke="#9BE9C5" stroke-width="2.6" fill="none" marker-end="url(#arr)"/>
  <path class="flowDep" d="M370 590 C370 700,500 725,620 740" stroke="#9BE9C5" stroke-width="2.6" fill="none" marker-end="url(#arr)"/>

  <text x="1160" y="840" class="b">Solid = lifecycle loop | Dashed = governance dependency</text>
</svg>
