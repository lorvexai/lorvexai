<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NHS triage architecture">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#0E2B49"/></linearGradient><style>.t{font:700 32px 'Segoe UI';fill:#EAF4FF}.s{font:500 16px 'Segoe UI';fill:#CEE4FB}.h{font:700 16px 'Segoe UI';fill:#ECF7FF}.b{font:500 13px 'Segoe UI';fill:#D6EAFE}</style></defs>
<rect width="1280" height="720" fill="url(#bg)"/>
<text class="t" x="40" y="56">NHS AI Triage Safety Architecture</text><text class="s" x="40" y="82">Written for urgent care leaders, clinical safety teams, and NHS digital operations</text>
<rect x="50" y="130" width="270" height="250" rx="16" fill="#12365E" stroke="#67B5F0"/><text class="h" x="70" y="160">Input Layer</text><text class="b" x="70" y="186">- Symptoms and history</text><text class="b" x="70" y="208">- Vitals and observations</text><text class="b" x="70" y="230">- Service capacity context</text><text class="b" x="70" y="252">- Risk flags from encounters</text>
<rect x="360" y="130" width="320" height="250" rx="16" fill="#15473B" stroke="#57D7B4"/><text class="h" x="380" y="160">AI Triage Layer</text><text class="b" x="380" y="186">- Clinical NLP structuring</text><text class="b" x="380" y="208">- Risk stratification model</text><text class="b" x="380" y="230">- Confidence scoring</text><text class="b" x="380" y="252">- Red-flag classification</text>
<rect x="720" y="130" width="510" height="250" rx="16" fill="#5A2538" stroke="#FF90B6"/><text class="h" x="740" y="160">Decision and Safety Layer</text><text class="b" x="740" y="186">- AI-assisted disposition recommendation</text><text class="b" x="740" y="208">- Mandatory human review queue</text><text class="b" x="740" y="230">- Advice and safety-net escalation logs</text><text class="b" x="740" y="252">- Audit and explainability store</text>
<rect x="170" y="430" width="940" height="220" rx="16" fill="#0D2746" stroke="#2D649D"/><text class="h" x="200" y="465">Where AI Runs</text><text class="b" x="200" y="492">1) Clinical text parsing and symptom normalization.</text><text class="b" x="200" y="516">2) Risk scoring and confidence estimation.</text><text class="b" x="200" y="540">3) Safe recommendation drafting bounded by escalation controls.</text>
</svg>
