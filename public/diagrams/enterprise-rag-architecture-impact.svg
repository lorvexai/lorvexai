<svg width="1440" height="920" viewBox="0 0 1440 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Enterprise RAG architecture with pre-retrieval loop, ACL gatekeeper, and reranker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09182C"/>
      <stop offset="100%" stop-color="#123E6A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#153D66" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0D2948" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E5382"/>
      <stop offset="100%" stop-color="#16466D"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#C8ECFF"/>
    </marker>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .phase{font:700 23px 'Segoe UI',Arial,sans-serif;fill:#EBF7FF}
      .meta{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#C9E6FF}
      .cardTitle{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#EEF8FF}
      .cardBody{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
      .flow{font:600 12px 'Segoe UI',Arial,sans-serif;fill:#DAEEFF}
      .gate{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#FFEFD8}
    </style>
  </defs>

  <rect width="1440" height="920" fill="url(#bg)"/>
  <ellipse cx="720" cy="390" rx="620" ry="330" fill="#2F80ED" fill-opacity="0.13"/>

  <text x="80" y="88" class="title">Enterprise RAG Architecture</text>
  <text x="80" y="120" class="sub">Five-layer system with pre-retrieval intelligence, secure retrieval gates, and agentic reasoning loops</text>

  <rect x="80" y="160" width="1280" height="720" rx="26" fill="#0C223C" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="112" y="200" width="248" height="640" rx="18" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="372" y="200" width="248" height="640" rx="18" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="632" y="200" width="248" height="640" rx="18" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="892" y="200" width="248" height="640" rx="18" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="1152" y="200" width="176" height="640" rx="18" fill="url(#panel)" stroke="#4F98D9"/>

  <text x="236" y="236" text-anchor="middle" class="phase">Ingestion</text>
  <text x="496" y="236" text-anchor="middle" class="phase">Pre-Retrieval</text>
  <text x="756" y="236" text-anchor="middle" class="phase">Retrieval</text>
  <text x="1016" y="236" text-anchor="middle" class="phase">Orchestration</text>
  <text x="1240" y="236" text-anchor="middle" class="phase">Generation &amp; Trust</text>

  <rect x="140" y="300" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="236" y="334" text-anchor="middle" class="cardTitle">Source Systems</text>
  <text x="236" y="356" text-anchor="middle" class="cardBody">Policies, SOPs, KBs, logs</text>

  <rect x="140" y="430" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="236" y="464" text-anchor="middle" class="cardTitle">Small-to-Large</text>
  <text x="236" y="486" text-anchor="middle" class="cardBody">Child chunks -> parent docs</text>

  <rect x="140" y="560" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="236" y="594" text-anchor="middle" class="cardTitle">Metadata &amp; ACL Tags</text>
  <text x="236" y="616" text-anchor="middle" class="cardBody">PII, role, region, policy</text>

  <rect x="400" y="300" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="496" y="334" text-anchor="middle" class="cardTitle">Query Rewrite</text>
  <text x="496" y="356" text-anchor="middle" class="cardBody">Intent expansion &amp; disambiguation</text>

  <rect x="400" y="430" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="496" y="464" text-anchor="middle" class="cardTitle">HyDE Builder</text>
  <text x="496" y="486" text-anchor="middle" class="cardBody">Hypothetical answer embedding</text>

  <rect x="400" y="560" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="496" y="594" text-anchor="middle" class="cardTitle">Route Planner</text>
  <text x="496" y="616" text-anchor="middle" class="cardBody">Select tools and retrieval path</text>

  <rect x="660" y="300" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="756" y="334" text-anchor="middle" class="cardTitle">ACL Gatekeeper</text>
  <text x="756" y="356" text-anchor="middle" class="cardBody">Policy-aware candidate filter</text>

  <rect x="660" y="430" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="756" y="464" text-anchor="middle" class="cardTitle">Hybrid Search</text>
  <text x="756" y="486" text-anchor="middle" class="cardBody">BM25 + vector retrieval</text>

  <rect x="660" y="560" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="756" y="594" text-anchor="middle" class="cardTitle">Cross-Encoder Reranker</text>
  <text x="756" y="616" text-anchor="middle" class="cardBody">Relevance over pure similarity</text>

  <rect x="920" y="300" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1016" y="334" text-anchor="middle" class="cardTitle">Context Builder</text>
  <text x="1016" y="356" text-anchor="middle" class="cardBody">Parent passages + citations</text>

  <rect x="920" y="430" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1016" y="464" text-anchor="middle" class="cardTitle">Agentic Loop (ReAct)</text>
  <text x="1016" y="486" text-anchor="middle" class="cardBody">Search again if evidence is weak</text>

  <rect x="920" y="560" width="192" height="90" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1016" y="594" text-anchor="middle" class="cardTitle">Policy Verifier</text>
  <text x="1016" y="616" text-anchor="middle" class="cardBody">Redaction and compliance checks</text>

  <rect x="1170" y="340" width="140" height="94" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1240" y="376" text-anchor="middle" class="cardTitle">LLM</text>
  <text x="1240" y="398" text-anchor="middle" class="cardBody">Structured answer</text>

  <rect x="1170" y="500" width="140" height="118" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1240" y="536" text-anchor="middle" class="cardTitle">Trust Layer</text>
  <text x="1240" y="558" text-anchor="middle" class="cardBody">Citations</text>
  <text x="1240" y="576" text-anchor="middle" class="cardBody">Groundedness</text>
  <text x="1240" y="594" text-anchor="middle" class="cardBody">Telemetry</text>

  <path d="M332 345 L400 345" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M592 345 L660 345" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M852 345 L920 345" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1112 385 L1170 385" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M236 390 L236 430" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M236 520 L236 560" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M496 390 L496 430" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M496 520 L496 560" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M756 390 L756 430" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M756 520 L756 560" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M1016 390 L1016 430" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1016 520 L1016 560" stroke="#C8ECFF" stroke-width="3.5" marker-end="url(#arrow)"/>

  <path d="M1112 475 C1150 475,1150 475,1170 530" stroke="#BDF5DB" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1240 620 C1240 690,1030 700,1016 650" stroke="#BDF5DB" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="650" y="690" width="212" height="48" rx="12" fill="#5B3A25" stroke="#E9B98A"/>
  <text x="756" y="719" text-anchor="middle" class="gate">Security Gate before retrieval output</text>

  <text x="934" y="674" class="flow">Agentic re-search loop if context confidence is low</text>
</svg>
