<svg width="1280" height="620" viewBox="0 0 1280 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NHS triage escalation flow">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B1F3A"/><stop offset="100%" stop-color="#102D4D"/></linearGradient><marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#74C8FF"/></marker><style>.t{font:700 30px 'Segoe UI';fill:#EAF4FF}.n{font:700 15px 'Segoe UI';fill:#ECF7FF}.s{font:500 12px 'Segoe UI';fill:#D6EAFE}</style></defs>
<rect width="1280" height="620" fill="url(#bg)"/>
<text class="t" x="40" y="54">Red-Flag Escalation and Human Oversight</text>
<rect x="80" y="140" width="180" height="86" rx="10" fill="#133B61" stroke="#6FC0F7"/><text class="n" x="170" y="172" text-anchor="middle">Assessment</text><text class="s" x="170" y="193" text-anchor="middle">Initial triage</text>
<rect x="300" y="140" width="180" height="86" rx="10" fill="#18463A" stroke="#59D7B7"/><text class="n" x="390" y="172" text-anchor="middle">AI Risk</text><text class="s" x="390" y="193" text-anchor="middle">Score and confidence</text>
<rect x="520" y="140" width="190" height="86" rx="10" fill="#5A3F1B" stroke="#F2BC73"/><text class="n" x="615" y="172" text-anchor="middle">Red Flag</text><text class="s" x="615" y="193" text-anchor="middle">Clinical trigger check</text>
<rect x="750" y="140" width="210" height="86" rx="10" fill="#5A2538" stroke="#FF90B6"/><text class="n" x="855" y="172" text-anchor="middle">Escalate</text><text class="s" x="855" y="193" text-anchor="middle">Senior clinician review</text>
<rect x="1000" y="140" width="190" height="86" rx="10" fill="#5A2538" stroke="#FF90B6"/><text class="n" x="1095" y="172" text-anchor="middle">Disposition</text><text class="s" x="1095" y="193" text-anchor="middle">Advice and safety netting</text>
<path d="M260 173 L295 173" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/><path d="M480 173 L515 173" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/><path d="M710 173 L745 173" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/><path d="M960 173 L995 173" stroke="#74C8FF" stroke-width="3" marker-end="url(#ar)"/>
<path d="M615 226 C620 300, 860 300, 1095 226" stroke="#59D7B7" stroke-width="3" fill="none" marker-end="url(#ar)"/>
<rect x="210" y="390" width="860" height="150" rx="12" fill="#0D2746" stroke="#2D649D"/><text class="s" x="240" y="428">Control rule: low confidence or red-flag patterns always route to human review.</text><text class="s" x="240" y="452">Safety KPIs: missed urgent-case rate, escalation time, rationale coverage.</text>
</svg>
