<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="End-to-End platform flow with dependencies">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06162B"/><stop offset="100%" stop-color="#10385C"/></linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#D3EEFF"/></marker>
    <style>
      .t{font:700 40px 'Inter',Arial,sans-serif;fill:#EEF7FF}
      .s{font:500 16px 'Inter',Arial,sans-serif;fill:#C7E3FB}
      .h{font:700 14px 'Inter',Arial,sans-serif;fill:#F3FAFF}
      .b{font:500 12px 'Inter',Arial,sans-serif;fill:#D8EEFF}
      .n{font:600 11px 'Inter',Arial,sans-serif;fill:#D8EEFF}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="60" y="72" class="t">End-to-End Platform Flow</text>
  <text x="60" y="98" class="s">Primary flow (solid arrows) and dependency flow (dashed arrows)</text>

  <rect x="50" y="120" width="1300" height="740" rx="22" fill="#0A213A" stroke="#3F8DD6"/>

  <g>
    <rect x="80" y="220" width="170" height="106" rx="12" fill="#123D72" stroke="#75BDF7"/><text x="165" y="250" class="n" text-anchor="middle">1</text><text x="165" y="272" class="h" text-anchor="middle">Data Sources</text>
    <rect x="270" y="220" width="170" height="106" rx="12" fill="#0F5A4A" stroke="#67D3B0"/><text x="355" y="250" class="n" text-anchor="middle">2</text><text x="355" y="272" class="h" text-anchor="middle">Ingestion &amp; Storage</text>
    <rect x="460" y="220" width="170" height="106" rx="12" fill="#6B3C13" stroke="#F7B26C"/><text x="545" y="250" class="n" text-anchor="middle">3</text><text x="545" y="272" class="h" text-anchor="middle">Processing &amp; Features</text>
    <rect x="650" y="220" width="170" height="106" rx="12" fill="#4B2D79" stroke="#C5A3FF"/><text x="735" y="250" class="n" text-anchor="middle">4</text><text x="735" y="272" class="h" text-anchor="middle">AI / ML / LLM Layer</text>
    <rect x="840" y="220" width="170" height="106" rx="12" fill="#7A1F57" stroke="#FF9FD1"/><text x="925" y="250" class="n" text-anchor="middle">5</text><text x="925" y="272" class="h" text-anchor="middle">MLOps &amp; Orchestration</text>
    <rect x="1030" y="220" width="170" height="106" rx="12" fill="#0F5561" stroke="#66D2E2"/><text x="1115" y="250" class="n" text-anchor="middle">6</text><text x="1115" y="272" class="h" text-anchor="middle">Risk Engines</text>
  </g>

  <path d="M250 273 L270 273" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path d="M440 273 L460 273" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path d="M630 273 L650 273" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path d="M820 273 L840 273" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>
  <path d="M1010 273 L1030 273" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>

  <rect x="110" y="400" width="1180" height="120" rx="14" fill="#2D2256" stroke="#9070D8"/>
  <text x="700" y="434" class="n" text-anchor="middle">7</text>
  <text x="700" y="456" class="h" text-anchor="middle">Governance, Controls &amp; Regulatory Compliance</text>
  <text x="700" y="480" class="b" text-anchor="middle">Model governance, audit lineage, risk controls, regulatory mapping</text>

  <rect x="220" y="600" width="430" height="110" rx="12" fill="#0E4A8C" stroke="#6BB5FF"/>
  <text x="435" y="632" class="n" text-anchor="middle">8</text>
  <text x="435" y="654" class="h" text-anchor="middle">Serving &amp; Decision Layer</text>
  <text x="435" y="676" class="b" text-anchor="middle">API scoring and decision engine</text>

  <rect x="750" y="600" width="430" height="110" rx="12" fill="#0A5D66" stroke="#66D8E2"/>
  <text x="965" y="632" class="n" text-anchor="middle">9</text>
  <text x="965" y="654" class="h" text-anchor="middle">Consumption &amp; Reporting</text>
  <text x="965" y="676" class="b" text-anchor="middle">Dashboards, regulatory returns, alerts</text>

  <path d="M650 655 L750 655" stroke="#D3EEFF" stroke-width="3.2" marker-end="url(#arr)"/>

  <path d="M355 326 L355 400" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M545 326 L545 400" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M735 326 L735 400" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M925 326 L925 400" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M1115 326 L1115 400" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M700 520 L700 600" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>
  <path d="M965 600 L965 520" stroke="#9BE9C5" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arr)"/>

  <text x="1160" y="780" class="b">Solid = primary flow | Dashed = control dependency</text>
</svg>
