<svg width="1400" height="860" viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="End-to-End Platform Flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#09182C"/><stop offset="100%" stop-color="#123E6A"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1E5382"/><stop offset="100%" stop-color="#15466D"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#CDEBFF"/></marker>
    <style>
      .title{font:700 44px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .node{font:700 17px 'Segoe UI',Arial,sans-serif;fill:#EDF8FF}
      .meta{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#D9EEFF}
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="70" y="78" class="title">End-to-End Platform Flow</text>
  <text x="70" y="108" class="sub">From source ingestion to governed decision intelligence</text>

  <rect x="70" y="150" width="1260" height="620" rx="24" fill="#0C223C" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="110" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="185" y="292" text-anchor="middle" class="node">Data</text>
  <text x="185" y="312" text-anchor="middle" class="node">Sources</text>

  <rect x="290" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="365" y="292" text-anchor="middle" class="node">Ingestion</text>
  <text x="365" y="312" text-anchor="middle" class="node">Storage</text>

  <rect x="470" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="545" y="292" text-anchor="middle" class="node">Feature</text>
  <text x="545" y="312" text-anchor="middle" class="node">Engineering</text>

  <rect x="650" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="725" y="292" text-anchor="middle" class="node">AI ML LLM</text>
  <text x="725" y="312" text-anchor="middle" class="node">Layer</text>

  <rect x="830" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="905" y="292" text-anchor="middle" class="node">Lifecycle</text>
  <text x="905" y="312" text-anchor="middle" class="node">Orchestration</text>

  <rect x="1010" y="250" width="150" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1085" y="292" text-anchor="middle" class="node">Risk</text>
  <text x="1085" y="312" text-anchor="middle" class="node">Engines</text>

  <rect x="1190" y="250" width="100" height="110" rx="12" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1240" y="292" text-anchor="middle" class="node">Serving</text>
  <text x="1240" y="312" text-anchor="middle" class="node">Reports</text>

  <path d="M260 305 L290 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M440 305 L470 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 305 L650 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M800 305 L830 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M980 305 L1010 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1160 305 L1190 305" stroke="#CDEBFF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="180" y="470" width="1040" height="170" rx="16" fill="#123458" stroke="#4F98D9"/>
  <text x="210" y="510" class="node">Governance Controls Compliance Plane</text>
  <text x="210" y="538" class="meta">Lineage, access control, model governance, policy validation, audit evidence, and regulatory mapping</text>

  <path d="M365 360 L365 470" stroke="#BDF5DB" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M545 360 L545 470" stroke="#BDF5DB" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M725 360 L725 470" stroke="#BDF5DB" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M905 360 L905 470" stroke="#BDF5DB" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1085 360 L1085 470" stroke="#BDF5DB" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M1240 360 C1240 430,1200 450,1140 470" stroke="#BDF5DB" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <text x="700" y="730" text-anchor="middle" class="meta">Platform objective: consistent risk intelligence, governed automation, and explainable enterprise decisions</text>
</svg>
