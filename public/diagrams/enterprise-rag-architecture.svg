<svg width="1440" height="920" viewBox="0 0 1440 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Enterprise RAG architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#09182C"/><stop offset="100%" stop-color="#123E6A"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#153D66" stop-opacity="0.86"/><stop offset="100%" stop-color="#0D2948" stop-opacity="0.86"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1D517F"/><stop offset="100%" stop-color="#134067"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#C8ECFF"/></marker>
    <style>
      .title{font:700 48px 'Segoe UI',Arial,sans-serif;fill:#ECF7FF}
      .sub{font:500 19px 'Segoe UI',Arial,sans-serif;fill:#C7E3FB}
      .phase{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#EBF7FF}
      .meta{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#C9E6FF}
      .cardTitle{font:700 19px 'Segoe UI',Arial,sans-serif;fill:#EEF8FF}
      .cardBody{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#D8EEFF}
      .flow{font:600 13px 'Segoe UI',Arial,sans-serif;fill:#DAEEFF}
    </style>
  </defs>

  <rect width="1440" height="920" fill="url(#bg)"/>
  <ellipse cx="720" cy="390" rx="600" ry="320" fill="#2F80ED" fill-opacity="0.14"/>

  <text x="80" y="88" class="title">Enterprise RAG Architecture</text>
  <text x="80" y="120" class="sub">Ingestion, retrieval, and generation with policy and evidence controls</text>

  <rect x="80" y="160" width="1280" height="720" rx="26" fill="#0C223C" stroke="#3F8DD6" stroke-width="2"/>

  <rect x="110" y="200" width="400" height="640" rx="20" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="520" y="200" width="400" height="640" rx="20" fill="url(#panel)" stroke="#4F98D9"/>
  <rect x="930" y="200" width="400" height="640" rx="20" fill="url(#panel)" stroke="#4F98D9"/>

  <text x="310" y="238" text-anchor="middle" class="phase">Data Ingestion</text>
  <text x="310" y="260" text-anchor="middle" class="meta">Normalize, chunk, tag, and index source content</text>
  <text x="720" y="238" text-anchor="middle" class="phase">Retrieval Core</text>
  <text x="720" y="260" text-anchor="middle" class="meta">Embed, search, rerank, and build context package</text>
  <text x="1130" y="238" text-anchor="middle" class="phase">Generation and Governance</text>
  <text x="1130" y="260" text-anchor="middle" class="meta">Prompt, infer, verify, and produce cited response</text>

  <rect x="160" y="320" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="310" y="357" text-anchor="middle" class="cardTitle">Source Systems</text>
  <text x="310" y="380" text-anchor="middle" class="cardBody">Docs, policies, records, knowledge bases</text>

  <rect x="160" y="450" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="310" y="487" text-anchor="middle" class="cardTitle">Chunk and Tag</text>
  <text x="310" y="510" text-anchor="middle" class="cardBody">ACL metadata, PII masking, freshness</text>

  <rect x="160" y="580" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="310" y="617" text-anchor="middle" class="cardTitle">Vector Index</text>
  <text x="310" y="640" text-anchor="middle" class="cardBody">Embeddings and searchable metadata</text>

  <rect x="570" y="320" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="720" y="357" text-anchor="middle" class="cardTitle">Query Embedder</text>
  <text x="720" y="380" text-anchor="middle" class="cardBody">Intent-aware query representation</text>

  <rect x="570" y="450" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="720" y="487" text-anchor="middle" class="cardTitle">Hybrid Retrieval</text>
  <text x="720" y="510" text-anchor="middle" class="cardBody">Vector + keyword + rerank</text>

  <rect x="570" y="580" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="720" y="617" text-anchor="middle" class="cardTitle">Context Pack</text>
  <text x="720" y="640" text-anchor="middle" class="cardBody">Top chunks with evidence and scores</text>

  <rect x="980" y="320" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1130" y="357" text-anchor="middle" class="cardTitle">Prompt Orchestrator</text>
  <text x="1130" y="380" text-anchor="middle" class="cardBody">Template + guardrails + policy</text>

  <rect x="980" y="450" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1130" y="487" text-anchor="middle" class="cardTitle">LLM Inference</text>
  <text x="1130" y="510" text-anchor="middle" class="cardBody">Model routing and response draft</text>

  <rect x="980" y="580" width="300" height="95" rx="14" fill="url(#card)" stroke="#79C0F7"/>
  <text x="1130" y="617" text-anchor="middle" class="cardTitle">Governed Answer</text>
  <text x="1130" y="640" text-anchor="middle" class="cardBody">Citation check, policy check, telemetry</text>

  <path d="M310 415 L310 450" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M310 545 L310 580" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M720 415 L720 450" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M720 545 L720 580" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1130 415 L1130 450" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1130 545 L1130 580" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M460 367 L570 367" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M460 497 L570 497" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M460 627 L570 627" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M870 367 L980 367" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 497 L980 497" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 627 L980 627" stroke="#C8ECFF" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1080" y="700" width="230" height="45" rx="12" fill="#285A89" stroke="#79C0F7"/>
  <text x="1195" y="728" text-anchor="middle" class="flow">Output: trusted response + citations</text>
</svg>
