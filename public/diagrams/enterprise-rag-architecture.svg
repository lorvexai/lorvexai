<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Enterprise RAG systems blueprint">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#123a6a"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ad8ff"/>
    </marker>
    <style>
      .t{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#ecf7ff}
      .st{font:500 20px 'Segoe UI',Arial,sans-serif;fill:#cbe6ff}
      .h{font:700 20px 'Segoe UI',Arial,sans-serif;fill:#eff9ff}
      .b{font:500 14px 'Segoe UI',Arial,sans-serif;fill:#d8ecff}
      .tag{font:700 12px 'Segoe UI',Arial,sans-serif;fill:#e7f6ff}
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="180" fill="#2f80ed" opacity="0.15"/>
  <circle cx="1260" cy="760" r="220" fill="#56ccf2" opacity="0.12"/>

  <text class="t" x="70" y="78">Enterprise RAG: Systems Blueprint</text>
  <text class="st" x="70" y="108">Original visual model for cross-industry AI knowledge operations</text>

  <rect x="70" y="150" width="1260" height="680" rx="28" fill="#0f2f56" stroke="#4ba3e8" stroke-width="2"/>

  <rect x="110" y="210" width="240" height="560" rx="18" fill="#143f6d" stroke="#67b5f0"/>
  <text class="h" x="132" y="242">1. Source Plane</text>
  <text class="b" x="132" y="270">- Internal docs</text>
  <text class="b" x="132" y="292">- Policies and controls</text>
  <text class="b" x="132" y="314">- Databases and events</text>
  <text class="b" x="132" y="336">- Email/transcripts</text>
  <rect x="132" y="365" width="195" height="34" rx="8" fill="#1b4d82"/><text class="tag" x="145" y="387">Ingestion + QC</text>
  <rect x="132" y="410" width="195" height="34" rx="8" fill="#1b4d82"/><text class="tag" x="145" y="432">Metadata + ACL</text>

  <rect x="390" y="210" width="300" height="560" rx="18" fill="#124b5e" stroke="#5ac8cf"/>
  <text class="h" x="412" y="242">2. Retrieval Brain</text>
  <text class="b" x="412" y="270">- Query rewrite</text>
  <text class="b" x="412" y="292">- Hybrid recall</text>
  <text class="b" x="412" y="314">- Rerank + compress</text>
  <text class="b" x="412" y="336">- Policy-aware filtering</text>
  <rect x="412" y="365" width="255" height="34" rx="8" fill="#1a5f74"/><text class="tag" x="425" y="387">Vector + graph retrieval</text>
  <rect x="412" y="410" width="255" height="34" rx="8" fill="#1a5f74"/><text class="tag" x="425" y="432">Context budget manager</text>

  <rect x="730" y="210" width="280" height="560" rx="18" fill="#4f3f1c" stroke="#f0b56c"/>
  <text class="h" x="752" y="242">3. Reasoning Fabric</text>
  <text class="b" x="752" y="270">- Prompt assembly</text>
  <text class="b" x="752" y="292">- LLM generation</text>
  <text class="b" x="752" y="314">- Structured response</text>
  <text class="b" x="752" y="336">- Citations + confidence</text>
  <rect x="752" y="365" width="235" height="34" rx="8" fill="#725426"/><text class="tag" x="765" y="387">Output contract checks</text>

  <rect x="1050" y="210" width="240" height="560" rx="18" fill="#4c2637" stroke="#ff8fb2"/>
  <text class="h" x="1072" y="242">4. Trust Loop</text>
  <text class="b" x="1072" y="270">- Groundedness eval</text>
  <text class="b" x="1072" y="292">- Risk policy review</text>
  <text class="b" x="1072" y="314">- Canary and release</text>
  <text class="b" x="1072" y="336">- Cost/latency monitor</text>
  <rect x="1072" y="365" width="195" height="34" rx="8" fill="#6c3149"/><text class="tag" x="1085" y="387">Feedback to routing</text>

  <path d="M350 490 L385 490" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M690 490 L725 490" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1010 490 L1045 490" stroke="#9ad8ff" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M1170 770 C1170 820, 420 820, 420 770" stroke="#59d7b7" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <text class="b" x="560" y="810">Outcome: reliable answers, measurable governance, and adaptive retrieval quality</text>
</svg>
